name: ci
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  ci:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        # `update` (not `install`) so dep resolution adapts to whichever
        # version of the SDK is the latest matching ^0.1 on Packagist.
        # Avoids stale-lockfile failures every time the SDK gets a patch.
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: PHPUnit
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: PHPStan (level max)
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHP-CS-Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Composer audit
        run: composer audit --no-dev

      - name: Upload coverage
        if: matrix.php == '8.2'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off on every commit
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          MISSING=$(git log --no-merges "${BASE_SHA}..HEAD" --pretty=format:'%H %s%n%b' | awk '
            /^[0-9a-f]{40} / { sha=$1; signed=0; next }
            /^Signed-off-by:/ { signed=1 }
            /^$/ { if (sha != "" && !signed) print sha; sha="" }
            END { if (sha != "" && !signed) print sha }
          ')
          if [ -n "$MISSING" ]; then
            echo "The following commits are missing DCO sign-off (git commit -s):"
            echo "$MISSING"
            exit 1
          fi
